<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard — Resinn Craftss</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
  <style>
    :root {
      --admin-bg: #fdfaf8;
      --admin-card: #ffffff;
      --admin-accent: #d4a373;
      --admin-text: #4a4238;
      --admin-danger: #e05a6a;
      --admin-success: #1ebe5d;
    }

    body.admin-body {
      background-color: var(--admin-bg);
      color: var(--admin-text);
      font-family: 'Jost', sans-serif;
      padding-top: 80px;
    }

    .admin-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2.5rem;
    }

    .admin-header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.5rem;
      font-weight: 400;
      margin: 0;
    }

    .btn-add {
      background: var(--admin-accent);
      color: white;
      border: none;
      padding: 0.8rem 1.5rem;
      border-radius: 30px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(212, 163, 115, 0.3);
    }

    .btn-add:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(212, 163, 115, 0.4);
    }

    /* --- Modal --- */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 3000;
      padding: 1rem;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: white;
      width: 100%;
      max-width: 500px;
      border-radius: 24px;
      padding: 2.5rem;
      position: relative;
      animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 20px 50px rgba(0,0,0,0.1);
    }

    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .modal-header {
      margin-bottom: 2rem;
    }

    .modal-header h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      margin: 0;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      font-size: 0.9rem;
      font-weight: 500;
      margin-bottom: 0.5rem;
      color: #7d7469;
    }

    .form-group input, 
    .form-group textarea, 
    .form-group select {
      width: 100%;
      padding: 0.9rem 1.2rem;
      border: 1.5px solid #eee;
      border-radius: 14px;
      font-family: inherit;
      font-size: 1rem;
      transition: all 0.3s ease;
      background: #fcfcfc;
    }

    .form-group input:focus, 
    .form-group textarea:focus {
      border-color: var(--admin-accent);
      outline: none;
      background: white;
      box-shadow: 0 0 0 4px rgba(212, 163, 115, 0.1);
    }

    .image-preview-area {
      width: 100%;
      height: 180px;
      border: 2px dashed #eee;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      overflow: hidden;
      margin-top: 0.5rem;
      position: relative;
    }

    .image-preview-area img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .image-preview-area .placeholder {
      text-align: center;
      color: #999;
    }

    .modal-footer {
      display: flex;
      gap: 1rem;
      margin-top: 2rem;
    }

    .btn-save {
      flex: 2;
      background: var(--admin-accent);
      color: white;
      border: none;
      padding: 1rem;
      border-radius: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-cancel {
      flex: 1;
      background: #f5f5f5;
      color: #666;
      border: none;
      padding: 1rem;
      border-radius: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    /* --- Product List --- */
    .admin-products-grid {
      display: grid;
      gap: 1.5rem;
    }

    .admin-product-card {
      background: white;
      border-radius: 20px;
      padding: 1.2rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.03);
      border: 1px solid rgba(0,0,0,0.02);
      transition: transform 0.3s ease;
    }

    .admin-product-card:hover {
      transform: translateX(5px);
    }

    .admin-product-img {
      width: 90px;
      height: 90px;
      border-radius: 14px;
      object-fit: cover;
      background: #f9f9f9;
    }

    .admin-product-info {
      flex: 1;
    }

    .admin-product-info h3 {
      margin: 0 0 0.3rem 0;
      font-size: 1.2rem;
    }

    .admin-product-info p {
      margin: 0;
      font-size: 0.9rem;
      color: #888;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .admin-product-price {
      font-weight: 600;
      color: var(--admin-accent);
      margin-top: 0.4rem;
      display: block;
    }

    .admin-product-actions {
      display: flex;
      gap: 0.8rem;
    }

    .btn-icon {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: none;
      transition: all 0.2s ease;
    }

    .btn-edit { background: #fdf5eb; color: var(--admin-accent); }
    .btn-edit:hover { background: var(--admin-accent); color: white; }

    .btn-delete { background: #fff5f6; color: var(--admin-danger); }
    .btn-delete:hover { background: var(--admin-danger); color: white; }

    /* --- Mobile Responsive --- */
    @media (max-width: 600px) {
      .admin-header h1 { font-size: 2rem; }
      .admin-product-card { padding: 1rem; gap: 1rem; }
      .admin-product-img { width: 70px; height: 70px; }
      .admin-product-info h3 { font-size: 1.1rem; }
      .btn-icon { width: 38px; height: 38px; }
      .modal-content { padding: 1.5rem; }
    }

    /* --- Login Overlay --- */
    #loginOverlay {
      position: fixed;
      inset: 0;
      background: var(--admin-bg);
      z-index: 5000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .login-card {
      background: white;
      padding: 3rem 2.5rem;
      border-radius: 28px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.05);
    }

    .login-card img {
      width: 80px;
      border-radius: 20px;
      margin-bottom: 1.5rem;
    }

    .login-card h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    .login-card p {
      color: #888;
      margin-bottom: 2rem;
    }

    .btn-login {
      width: 100%;
      background: var(--admin-accent);
      color: white;
      border: none;
      padding: 1.1rem;
      border-radius: 16px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 1rem;
    }
  </style>
</head>
<body class="admin-body">

  <!-- ===== LOGIN OVERLAY ===== -->
  <div id="loginOverlay">
    <div class="login-card">
      <img src="logo.jpeg" alt="Logo" />
      <h2>Admin Entrance</h2>
      <p>Please enter your access key to continue.</p>
      <div class="form-group">
        <input type="password" id="adminPassword" placeholder="Access Key" />
      </div>
      <button class="btn-login" id="loginBtn">Enter Dashboard</button>
    </div>
  </div>

  <!-- ===== NAVBAR (Simple) ===== -->
  <header class="navbar scrolled">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">
        <img src="logo.jpeg" alt="Logo" class="logo-img" />
      </a>
      <div style="font-family: 'Cormorant Garamond'; font-size: 1.4rem; font-style: italic;">Admin Portal</div>
      <a href="index.html" class="nav-link" style="margin-left: auto;">View Site</a>
    </div>
  </header>

  <main class="admin-container">
    <div class="admin-header">
      <h1>Manage Products</h1>
      <button class="btn-add" id="addItemBtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        Add Item
      </button>
    </div>

    <div id="adminProductsList" class="admin-products-grid">
      <!-- Products will be injected here -->
    </div>
  </main>

  <!-- ===== PRODUCT MODAL ===== -->
  <div class="modal" id="productModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">Add New Item</h2>
      </div>
      <form id="productForm" onsubmit="saveProduct(event)">
        <input type="hidden" id="editId" />
        
        <div class="form-group">
          <label>Product Image</label>
          <div class="image-preview-area" id="imagePreviewArea">
            <input type="file" id="imageInput" accept="image/*" hidden />
            <div id="imagePlaceholder" class="placeholder">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
              <p>Tap to upload image</p>
            </div>
            <img id="imagePreview" style="display: none;" />
          </div>
        </div>

        <div class="form-group">
          <label for="pName">Product Name</label>
          <input type="text" id="pName" placeholder="e.g. Resin Flower Coaster" required />
        </div>

        <div class="form-group">
          <label for="pDesc">Description</label>
          <textarea id="pDesc" rows="3" placeholder="Describe the item..." required></textarea>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
          <div class="form-group">
            <label for="pPrice">Price (₹)</label>
            <input type="text" id="pPrice" placeholder="e.g. 299" required />
          </div>
          <div class="form-group">
            <label for="pTag">Tag (Optional)</label>
            <select id="pTag">
              <option value="">None</option>
              <option value="Bestseller">Bestseller</option>
              <option value="New">New</option>
              <option value="Custom">Custom</option>
              <option value="Sale">Sale</option>
            </select>
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn-cancel" id="cancelBtn">Cancel</button>
          <button type="submit" class="btn-save" id="saveBtn">Save Product</button>
        </div>
      </form>
    </div>
  </div>

  <script src="admin.js" type="module"></script>
</body>
</html>
